# 4 app servers + 2 infra (Kafka, RabbitMQ)
services:
  # --- Infra ---
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      # Single broker: replication factor and min ISR must be 1
      # TODO: research more about kafka configuration - scalability, performance, etc.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 45s

  # --- App servers (same image, different commands) ---
  http:
    build: .
    command: ["uv", "run", "http"]
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy

  grpc:
    build: .
    command: ["uv", "run", "rpc"]
    ports:
      - "50051:50051"
    volumes:
      - ./src:/app/src
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy

  rabbit_consumer:
    build: .
    command: ["sh", "-c", "sleep 5 && exec uv run rabbit"]
    volumes:
      - ./src:/app/src
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure
    deploy:
      replicas: 5

  kafka_consumer:
    build: .
    command: ["sh", "-c", "sleep 5 && exec uv run kafka"]
    volumes:
      - ./src:/app/src
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure
    deploy:
      replicas: 5
