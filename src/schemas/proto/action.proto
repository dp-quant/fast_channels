syntax = "proto3";

package app.schemas.action;

import "google/protobuf/timestamp.proto";

// Context for an Action (mirrors src.schemas.entities.ActionContext).
message ActionContext {
  int64 seed = 1;
  google.protobuf.Timestamp updated_at = 2;
}

service ActionService {
  // Create a new Action.
  rpc Create (ActionCreate) returns (Action);

  // Reseed an existing Action (set new context/seed).
  rpc Reseed (ActionReseed) returns (Action);
}

// Command to create an Action (mirrors HTTP ActionCreate).
message ActionCreate {
  string name = 1;
  string description = 2;
  repeated string tags = 3;
  ActionContext context = 4;
}

// Command to reseed an Action (set new context).
message ActionReseed {
  string id = 1;
  string name = 2;
  string description = 3;
  repeated string tags = 4;
  ActionContext context = 5;
  google.protobuf.Timestamp created_at = 6;
}

// Action entity (mirrors src.schemas.entities.Action).
message Action {
  string id = 1;
  string name = 2;
  string description = 3;
  repeated string tags = 4;
  ActionContext context = 5;
  google.protobuf.Timestamp created_at = 6;
}


